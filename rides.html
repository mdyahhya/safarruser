<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0050ff">
  <title>Safarr – My Rides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root{--primary:#0050ff;--nav:#0a1628;--white:#fff;--off-white:#f8f9fc;--gray:#8a9ab5;--gray-light:#eff2f6;--success:#00c853;--danger:#ff3d00;--warning:#ffab00;--radius:24px;--shadow:0 10px 30px rgba(10,22,40,.08);--shadow-lg:0 20px 50px rgba(0,80,255,.15)}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--nav);min-height:100vh}
    .app-header{padding:60px 24px 20px;background:var(--white);display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.02)}
    .back-btn{width:40px;height:40px;border-radius:14px;background:var(--off-white);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;text-decoration:none}
    .content{padding:24px;padding-bottom:110px}
    .history-card{background:var(--white);border-radius:22px;padding:20px;margin-bottom:16px;border:1px solid var(--gray-light);transition:all .3s;box-shadow:var(--shadow)}
    .hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .hist-fare{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
    .hist-status{font-size:.7rem;font-weight:800;padding:5px 12px;border-radius:20px;text-transform:uppercase}
    .hist-status.completed{background:var(--success);color:#fff}
    .hist-status.pending{background:var(--warning);color:var(--nav)}
    .hist-status.cancelled{background:var(--danger);color:#fff}
    .hist-status.accepted{background:var(--primary);color:#fff}
    .hist-route{font-size:.85rem;font-weight:500;color:var(--nav);line-height:1.5}
    .hist-time{font-size:.72rem;color:var(--gray);margin-top:10px;font-weight:500}
    .tab-btn-bar{position:fixed;bottom:0;left:0;right:0;height:90px;background:var(--white);display:flex;align-items:center;justify-content:space-around;padding:0 10px 20px;border-top:1px solid var(--gray-light);z-index:100}
    .tab-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--gray);cursor:pointer;transition:all .3s;position:relative;text-decoration:none;padding:8px 0}
    .tab-btn.active{color:var(--primary)}
    .tab-btn svg{width:24px;height:24px}
    .tab-btn.active svg{transform:translateY(-2px)}
    .tab-btn::after{content:'';position:absolute;top:-1px;left:50%;width:0%;height:3px;background:var(--primary);border-radius:0 0 4px 4px;transition:all .3s;transform:translateX(-50%)}
    .tab-btn.active::after{width:40%}
    .tab-txt{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--nav);color:#fff;padding:14px 28px;border-radius:50px;font-size:.9rem;z-index:10000;opacity:0;transition:all .3s ease;pointer-events:none;font-weight:500;white-space:nowrap}
    .skeleton{background:linear-gradient(90deg,#eff2f6 25%,#f7f8fa 50%,#eff2f6 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:12px}
    @keyframes loading{from{background-position:200% 0}to{background-position:-200% 0}}
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <header class="app-header">
    <a href="index.html" class="back-btn">←</a>
    <h1 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800">My Rides</h1>
  </header>
  <div class="content">
    <div id="rides-list">
      <div class="skeleton" style="height:100px;margin-bottom:16px"></div>
      <div class="skeleton" style="height:100px;margin-bottom:16px"></div>
    </div>
  </div>
  <nav class="tab-btn-bar">
    <a class="tab-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="tab-txt">Book</span>
    </a>
    <a class="tab-btn active" href="rides.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 3h15V19H1z"/><path d="M17 11V19h4V14L17 11z"/><circle cx="4" cy="19" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      <span class="tab-txt">Rides</span>
    </a>
    <a class="tab-btn" href="wallet.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>
      <span class="tab-txt">Wallet</span>
    </a>
    <a class="tab-btn" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="tab-txt">Profile</span>
    </a>
    <a class="tab-btn" href="support.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3z"/></svg>
      <span class="tab-txt">Support</span>
    </a>
  </nav>
  <script>
    const SUPABASE_URL = 'https://eouqjkvfbjefbyindqjp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvdXFqa3ZmYmplZmJ5aW5kcWpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTM2NjAsImV4cCI6MjA5MjY4OTY2MH0.yivlkQjKt4r6Lx507BsuM48t9aIM-7OBJOx91_6XEfw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const APP = { user: JSON.parse(localStorage.getItem('sf_user') || 'null') };

    window.onload = async () => {
      if (!APP.user) { window.location.href = 'index.html'; return; }
      await loadRideHistory();
    };

    async function loadRideHistory() {
      const { data } = await _supabase.from('ride_bookings')
        .select('*').eq('customer_id', APP.user.id).order('created_at', { ascending: false });
      const list = document.getElementById('rides-list');
      if (!data?.length) {
        list.innerHTML = '<div style="text-align:center;padding-top:60px"><div style="font-size:3.5rem;margin-bottom:16px">📭</div><p style="color:var(--gray);font-size:1rem;font-weight:500">No rides yet.</p><p style="color:var(--gray);font-size:.85rem;margin-top:8px">Book your first auto on the home tab!</p></div>';
        return;
      }
      list.innerHTML = data.map(r => `
        <div class="history-card">
          <div class="hist-top">
            <span class="hist-fare">₹${r.estimated_fare}</span>
            <span class="hist-status ${r.status}">${r.status}</span>
          </div>
          <div class="hist-route">📍 ${r.pickup_address}<br>➜ ${r.dropoff_address}</div>
          ${r.driver_name ? `<div style="font-size:.8rem;color:var(--gray);margin-top:10px">🛺 ${r.driver_name} · ${r.auto_number || ''}</div>` : ''}
          <div class="hist-time">${new Date(r.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
        </div>`).join('');
    }

    function showToast(m) {
      const t = document.getElementById('toast');
      t.textContent = m; t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(-10px)';
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(0)'; }, 3000);
    }

    // Handle Back Button
    window.history.pushState({page: 1}, "", "");
    window.onpopstate = function(event) {
      window.location.href = 'index.html';
    };
  </script>
</body>
</html>
