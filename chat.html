<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0050ff">
  <title>Safarr – Chat with Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root{--primary:#0050ff;--navy:#0a1628;--white:#fff;--off-white:#f8f9fc;--gray:#8a9ab5;--gray-light:#eff2f6;--success:#00c853;--danger:#ff3d00;--radius:20px}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'DM Sans',sans-serif;background:var(--off-white);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

    /* Header */
    .chat-header{background:var(--white);padding:50px 20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--gray-light);flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.04)}
    .back-btn{width:40px;height:40px;border-radius:14px;background:var(--off-white);border:none;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;text-decoration:none}
    .driver-avatar{width:46px;height:46px;border-radius:16px;object-fit:cover;border:2px solid var(--primary);flex-shrink:0}
    .driver-info{flex:1}
    .driver-chat-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem}
    .driver-chat-status{font-size:.78rem;color:var(--success);font-weight:600}
    .call-btn{width:42px;height:42px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;color:#fff}

    /* Message Feed */
    .messages-feed{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
    .msg-row{display:flex;align-items:flex-end;gap:8px}
    .msg-row.sent{flex-direction:row-reverse}
    .msg-avatar{width:32px;height:32px;border-radius:10px;object-fit:cover;flex-shrink:0}
    .msg-bubble{max-width:72%;padding:12px 16px;border-radius:20px;font-size:.93rem;line-height:1.5;position:relative}
    .msg-row.received .msg-bubble{background:var(--white);border-radius:4px 20px 20px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .msg-row.sent .msg-bubble{background:var(--primary);color:#fff;border-radius:20px 4px 20px 20px}
    .msg-time{font-size:.68rem;opacity:.55;margin-top:4px;display:block}
    .msg-row.sent .msg-time{text-align:right}

    /* Voice message */
    .voice-bubble{display:flex;align-items:center;gap:12px;padding:12px 16px;min-width:180px}
    .voice-play{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .msg-row.sent .voice-play{background:rgba(255,255,255,.25);color:#fff}
    .msg-row.received .voice-play{background:var(--primary);color:#fff}
    .voice-wave{flex:1;height:24px}
    .voice-dur{font-size:.75rem;opacity:.7}

    /* Date divider */
    .date-divider{text-align:center;font-size:.72rem;color:var(--gray);font-weight:600;padding:8px 0;background:var(--off-white);position:sticky;top:0}

    /* Input Box */
    .chat-input-bar{background:var(--white);padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--gray-light);display:flex;align-items:flex-end;gap:10px;flex-shrink:0}
    .msg-input{flex:1;background:var(--off-white);border:2px solid var(--gray-light);border-radius:22px;padding:12px 18px;font-size:.95rem;font-family:'DM Sans',sans-serif;resize:none;max-height:120px;outline:none;transition:border-color .2s}
    .msg-input:focus{border-color:var(--primary)}
    .icon-btn{width:48px;height:48px;border-radius:16px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
    .send-btn{background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(0,80,255,.3)}
    .send-btn:active{transform:scale(.92)}
    .voice-btn{background:var(--off-white);color:var(--navy)}
    .voice-btn.recording{background:#ff3d00;color:#fff;animation:pulse 1s ease infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,61,0,.4)}50%{box-shadow:0 0 0 12px rgba(255,61,0,0)}}

    /* Recording Indicator */
    .rec-bar{background:var(--danger);color:#fff;padding:10px 20px;text-align:center;font-weight:700;font-size:.88rem;display:none;align-items:center;gap:8px;justify-content:center}
    .rec-dot{width:10px;height:10px;border-radius:50%;background:#fff;animation:blink 1s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* Ride Context Banner */
    .ride-banner{background:linear-gradient(135deg,#0050ff 0%,#0038c4 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .ride-banner-txt{font-size:.82rem;font-weight:600;opacity:.9}
    .ride-banner-title{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem}

    /* Empty state */
    .empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--gray);text-align:center;padding:40px}
    .empty-chat-icon{font-size:3rem}

    /* Scrollbar */
    .messages-feed::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
  <!-- Chat Header -->
  <div class="chat-header">
    <a class="back-btn" href="index.html">←</a>
    <img src="https://eouqjkvfbjefbyindqjp.supabase.co/storage/v1/object/public/driver-profiles/129480db-3d9a-4a5d-97e4-948b4c2c62b9/profile.jpg" 
         class="driver-avatar" id="driver-avatar"
         onerror="this.src='https://ui-avatars.com/api/?name=Rakesh+Kumar&background=0050ff&color=fff'">
    <div class="driver-info">
      <div class="driver-chat-name">Rakesh Kumar</div>
      <div class="driver-chat-status" id="driver-status">🟢 Online</div>
    </div>
    <button class="call-btn" onclick="startVoiceCall()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 12 19.79 19.79 0 0 1 1 3.18 2 2 0 0 1 2.96 1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.71 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.58 2.81.71A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>

  <!-- Ride Banner -->
  <div class="ride-banner" id="ride-banner" style="display:none">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 3h15V19H1z"/><path d="M17 11V19h4V14L17 11z"/><circle cx="4" cy="19" r="2"/><circle cx="12" cy="19" r="2"/></svg>
    <div>
      <div class="ride-banner-title">Current Ride with Rakesh Kumar</div>
      <div class="ride-banner-txt" id="ride-banner-txt">Auto MH12HK6778 · Tap to track</div>
    </div>
  </div>

  <!-- Recording Indicator -->
  <div class="rec-bar" id="rec-bar"><div class="rec-dot"></div> Recording... tap mic to send</div>

  <!-- Messages Feed -->
  <div class="messages-feed" id="messages-feed">
    <div class="empty-chat" id="empty-state">
      <div class="empty-chat-icon">💬</div>
      <p style="font-weight:700;font-size:1rem">Chat with Rakesh Kumar</p>
      <p style="font-size:.85rem">Your ride messages appear here in real-time</p>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="chat-input-bar">
    <button class="icon-btn voice-btn" id="voice-btn" onclick="toggleRecording()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/>
      </svg>
    </button>
    <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1" 
              oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="icon-btn send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <script>
    const SUPABASE_URL = 'https://eouqjkvfbjefbyindqjp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvdXFqa3ZmYmplZmJ5aW5kcWpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTM2NjAsImV4cCI6MjA5MjY4OTY2MH0.yivlkQjKt4r6Lx507BsuM48t9aIM-7OBJOx91_6XEfw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DRIVER_ID = '129480db-3d9a-4a5d-97e4-948b4c2c62b9';
    const DRIVER_NAME = 'Rakesh Kumar';

    let APP = {
      user: JSON.parse(localStorage.getItem('sf_user') || 'null'),
      ride: JSON.parse(localStorage.getItem('sf_pending_ride') || 'null'),
      channel: null,
    };
    let mediaRecorder = null;
    let recordingChunks = [];
    let isRecording = false;

    window.onload = () => {
      if (!APP.user) { window.location.href = 'index.html'; return; }
      if (APP.ride) {
        document.getElementById('ride-banner').style.display = 'flex';
        document.getElementById('ride-banner-txt').textContent = `Auto MH12HK6778 · ${APP.ride.pickup_address || ''}`;
      }
      loadMessages();
      subscribeToMessages();
    };

    // ── LOAD MESSAGES ──────────────────────────────────
    async function loadMessages() {
      const { data } = await _supabase
        .from('safarr_messages')
        .select('*')
        .eq('receiver_id', DRIVER_ID)
        .or(`sender_id.eq.${APP.user.id},receiver_id.eq.${APP.user.id}`)
        .order('created_at', { ascending: true });

      if (data?.length) {
        document.getElementById('empty-state').style.display = 'none';
        data.forEach(renderMessage);
        scrollToBottom();
      }
    }

    // ── RENDER MESSAGE ──────────────────────────────────
    function renderMessage(msg) {
      const feed = document.getElementById('messages-feed');
      const isSent = msg.sender_id === APP.user.id;
      const time = new Date(msg.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      
      const div = document.createElement('div');
      div.className = `msg-row ${isSent ? 'sent' : 'received'}`;
      div.id = 'msg-' + msg.id;

      let bubbleContent = '';
      if (msg.message_type === 'voice' && msg.voice_url) {
        bubbleContent = `
          <div class="voice-bubble">
            <button class="voice-play" onclick="playVoice('${msg.voice_url}', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <svg class="voice-wave" viewBox="0 0 120 24" preserveAspectRatio="none">
              ${generateWave()}
            </svg>
            <span class="voice-dur">${msg.voice_duration || '0:05'}</span>
          </div>`;
      } else {
        bubbleContent = `${escapeHtml(msg.message || '')}`;
      }

      div.innerHTML = `
        ${!isSent ? `<img class="msg-avatar" src="https://eouqjkvfbjefbyindqjp.supabase.co/storage/v1/object/public/driver-profiles/129480db-3d9a-4a5d-97e4-948b4c2c62b9/profile.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Rakesh&background=0050ff&color=fff'">` : ''}
        <div class="msg-bubble">
          ${bubbleContent}
          <span class="msg-time">${time}${isSent ? ' ✓' : ''}</span>
        </div>`;

      // Remove empty state
      document.getElementById('empty-state').style.display = 'none';
      feed.appendChild(div);
    }

    // ── SEND MESSAGE ──────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      autoResize(input);

      const msg = {
        sender_id: APP.user.id,
        sender_type: 'passenger',
        sender_name: APP.user.full_name,
        receiver_id: DRIVER_ID,
        message: text,
        message_type: 'text'
      };

      const { data } = await _supabase.from('safarr_messages').insert(msg).select().single();
      if (data) { renderMessage(data); scrollToBottom(); }
    }

    // ── SUBSCRIBE REAL-TIME ──────────────────────────────────
    function subscribeToMessages() {
      APP.channel = _supabase
        .channel('chat-passenger-' + APP.user.id)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'safarr_messages',
          filter: `receiver_id=eq.${APP.user.id}`
        }, (payload) => {
          // Only show messages from driver
          if (payload.new.sender_id === DRIVER_ID) {
            if (!document.getElementById('msg-' + payload.new.id)) {
              renderMessage(payload.new);
              scrollToBottom();
            }
          }
        })
        .subscribe();
    }

    // ── VOICE RECORDING ──────────────────────────────────
    async function toggleRecording() {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          recordingChunks = [];
          mediaRecorder.ondataavailable = (e) => recordingChunks.push(e.data);
          mediaRecorder.onstop = sendVoiceMessage;
          mediaRecorder.start();
          isRecording = true;
          document.getElementById('voice-btn').classList.add('recording');
          document.getElementById('rec-bar').style.display = 'flex';
        } catch(e) {
          showToast('Microphone access denied');
        }
      } else {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        isRecording = false;
        document.getElementById('voice-btn').classList.remove('recording');
        document.getElementById('rec-bar').style.display = 'none';
      }
    }

    async function sendVoiceMessage() {
      const blob = new Blob(recordingChunks, { type: 'audio/webm' });
      const path = `voice/${APP.user.id}_${Date.now()}.webm`;
      
      const { error: upErr } = await _supabase.storage.from('safarr-storage').upload(path, blob);
      if (upErr) { showToast('Voice upload failed'); return; }
      
      const { data: urlData } = _supabase.storage.from('safarr-storage').getPublicUrl(path);
      const msg = {
        sender_id: APP.user.id,
        sender_type: 'passenger',
        sender_name: APP.user.full_name,
        receiver_id: DRIVER_ID,
        message: '🎤 Voice message',
        message_type: 'voice',
        voice_url: urlData.publicUrl,
        voice_duration: '0:05'
      };
      const { data } = await _supabase.from('safarr_messages').insert(msg).select().single();
      if (data) { renderMessage(data); scrollToBottom(); }
    }

    function startVoiceCall() {
      showToast('📞 Calling Rakesh Kumar...');
      setTimeout(() => window.open('tel:9876543210'), 500);
    }

    function playVoice(url, btn) {
      const audio = new Audio(url);
      audio.play();
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
      audio.onended = () => {
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
      };
    }

    function generateWave() {
      let d = '';
      for(let i = 0; i < 30; i++) {
        const h = 4 + Math.random() * 16;
        const x = i * 4;
        d += `<rect x="${x}" y="${12 - h/2}" width="2.5" height="${h}" rx="1.25" fill="currentColor" opacity="${0.4 + Math.random() * 0.6}"/>`;
      }
      return d;
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function scrollToBottom() {
      const feed = document.getElementById('messages-feed');
      feed.scrollTop = feed.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(m) {
      let t = document.getElementById('_toast');
      if (!t) {
        t = document.createElement('div');
        t.id = '_toast';
        t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#0a1628;color:#fff;padding:12px 24px;border-radius:50px;font-size:.9rem;z-index:99999;transition:opacity .3s;pointer-events:none;font-weight:600';
        document.body.appendChild(t);
      }
      t.textContent = m; t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 3000);
    }

    // Back button
    window.history.pushState({page: 1}, '', '');
    window.onpopstate = () => window.location.href = 'index.html';
  </script>
</body>
</html>
