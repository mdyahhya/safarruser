<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0050ff">
  <title>Safarr – Chat with Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root{--primary:#0050ff;--navy:#0a1628;--white:#fff;--off-white:#f8f9fc;--gray:#8a9ab5;--gray-light:#eff2f6;--success:#00c853;--danger:#ff3d00;--radius:20px}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    
    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      display: flex;
      flex-direction: column;
      margin: 0;
      overflow: hidden;
      /* Height set dynamically by JS for Android compatibility */
      height: 100vh;
      height: 100dvh;
    }

    /* Header */
    .chat-header {
      background: var(--white);
      padding: calc(env(safe-area-inset-top, 20px) + 12px) 20px 16px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--gray-light);
      flex-shrink: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,.04);
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 14px;
      background: var(--off-white); border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .driver-avatar { width: 44px; height: 44px; border-radius: 14px; object-fit: cover; border: 2px solid var(--primary); }
    .driver-info { flex: 1; }
    .driver-chat-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; }
    .driver-chat-status { font-size: .75rem; color: var(--success); font-weight: 600; }
    .call-btn {
      width: 38px; height: 38px; background: var(--primary); border-radius: 12px;
      border: none; color: #fff; display: flex; align-items: center; justify-content: center;
    }

    /* Language Select */
    .lang-selector {
      background: var(--off-white); border: 1px solid var(--gray-light); border-radius: 10px;
      padding: 4px 8px; font-size: .75rem; font-weight: 700; color: var(--navy); outline: none;
      cursor: pointer; font-family: inherit; margin-right: 5px;
    }
    .translation-card {
      margin-top: 8px; padding: 10px; background: rgba(0,80,255,0.05); border-radius: 12px;
      font-size: .85rem; color: var(--navy); border-left: 3px solid var(--primary);
      display: flex; align-items: flex-start; gap: 8px;
    }
    .sent .translation-card { background: rgba(255,255,255,0.15); color: #fff; border-left-color: #fff; }
    .speak-btn {
      background: none; border: none; color: inherit; cursor: pointer; opacity: 0.7; padding: 2px;
    }
    .speak-btn:hover { opacity: 1; }

    /* Message Feed Area */
    .messages-feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      z-index: 1;
    }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; width: 100%; }
    .msg-row.sent { flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 10px; object-fit: cover; border: 1.5px solid var(--white); }
    .msg-bubble {
      max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: .95rem; line-height: 1.4;
      position: relative; word-wrap: break-word;
    }
    .msg-row.received .msg-bubble { background: var(--white); border-radius: 4px 18px 18px 18px; box-shadow: 0 2px 12px rgba(0,0,0,.05); }
    .msg-row.sent .msg-bubble { background: var(--primary); color: #fff; border-radius: 18px 4px 18px 18px; }
    .msg-time { font-size: .65rem; opacity: .6; margin-top: 4px; display: block; }
    .msg-row.sent .msg-time { text-align: right; color: rgba(255,255,255,0.8); }

    /* Voice Note UI - Modern WhatsApp Style */
    .voice-bubble { display: flex; align-items: center; gap: 10px; min-width: 170px; padding: 4px 0; }
    .voice-play {
      width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .msg-row.sent .voice-play { background: rgba(255,255,255,0.25); color: #fff; }
    .msg-row.received .voice-play { background: var(--primary); color: #fff; }
    .voice-wave { flex: 1; height: 24px; color: currentColor; }
    .voice-dur { font-size: .75rem; font-weight: 700; min-width: 32px; }

    /* Recording Alert bar - HIDDEN by default */
    .rec-bar {
      background: var(--danger); color: #fff; padding: 10px; text-align: center;
      font-size: .85rem; font-weight: 700; display: none; align-items: center; justify-content: center; gap: 8px;
      flex-shrink: 0; z-index: 50;
    }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Input Bar */
    .chat-input-bar {
      background: var(--white);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 12px));
      border-top: 1px solid var(--gray-light);
      display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0; z-index: 100;
    }
    .msg-input {
      flex: 1; background: var(--off-white); border: 1.5px solid var(--gray-light);
      border-radius: 20px; padding: 10px 16px; font-size: .95rem; font-family: inherit;
      resize: none; max-height: 80px; outline: none; transition: border-color 0.2s;
    }
    .msg-input:focus { border-color: var(--primary); }
    .icon-btn {
      width: 44px; height: 44px; border-radius: 14px; border: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s;
    }
    .icon-btn:active { transform: scale(0.95); }
    .send-btn { background: var(--primary); color: #fff; }
    .voice-btn { background: #f0f4ff; color: var(--primary); }
    .voice-btn.recording { background: var(--danger); color: #fff; }

    .empty-chat { padding: 60px 40px; text-align: center; color: var(--gray); font-size: .9rem; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .messages-feed::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>

  <!-- Chat Header -->
  <header class="chat-header">
    <a class="back-btn" href="index.html">←</a>
    <img src="https://eouqjkvfbjefbyindqjp.supabase.co/storage/v1/object/public/driver-profiles/129480db-3d9a-4a5d-97e4-948b4c2c62b9/profile.jpg" 
         class="driver-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Rakesh+Kumar&background=0050ff&color=fff'">
    <div class="driver-info">
      <div class="driver-chat-name">Rakesh Kumar</div>
      <div class="driver-chat-status">🟢 Online</div>
    </div>
    <select class="lang-selector" id="my-lang" onchange="updateMyLang()">
      <option value="English">English</option>
      <option value="Hindi">Hindi</option>
      <option value="Marathi">Marathi</option>
    </select>
    <button class="call-btn" onclick="startVoiceCall()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 12 19.79 19.79 0 0 1 1 3.18 2 2 0 0 1 2.96 1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.71 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.58 2.81.71A2 2 0 0 1 22 16.92z"/></svg>
    </button>
  </header>

  <!-- Recording Indicator -->
  <div class="rec-bar" id="rec-bar"><div class="rec-dot"></div> Live Recording...</div>

  <!-- Messages Feed -->
  <div class="messages-feed" id="messages-feed">
    <div class="empty-chat" id="empty-state">
      <p style="font-weight:700">Safe Chat Active 💬</p>
      <p style="opacity:0.6;margin-top:5px">Say hello to Rakesh!</p>
    </div>
  </div>

  <!-- Input Bar -->
  <footer class="chat-input-bar">
    <button class="icon-btn voice-btn" id="voice-btn" onclick="toggleRecording()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/></svg>
    </button>
    <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="icon-btn send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </footer>

  <script>
    const SUPABASE_URL = 'https://eouqjkvfbjefbyindqjp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvdXFqa3ZmYmplZmJ5aW5kcWpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTM2NjAsImV4cCI6MjA5MjY4OTY2MH0.yivlkQjKt4r6Lx507BsuM48t9aIM-7OBJOx91_6XEfw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DRIVER_ID = '129480db-3d9a-4a5d-97e4-948b4c2c62b9';
    let APP = {
      user: JSON.parse(localStorage.getItem('sf_user') || 'null'),
      ride: JSON.parse(localStorage.getItem('sf_pending_ride') || 'null'),
    };
    let mediaRecorder, recordingChunks = [], isRecording = false;

    window.onload = async () => {
      if (!APP.user) {
        const stored = localStorage.getItem('sf_user');
        if (stored) APP.user = JSON.parse(stored);
        else { window.location.href = 'index.html'; return; }
      }
      
      // Load preference
      if (APP.user.preferred_language) {
        document.getElementById('my-lang').value = APP.user.preferred_language;
      }

      loadMessages();
      subscribeToMessages();
      fetchDriverLang().catch(e => console.log('Driver lang fetch failed - using default:', e));
    };

    let driverLang = 'English';
    async function fetchDriverLang() {
      try {
        const { data, error } = await _supabase.from('auto_drivers').select('language').eq('id', DRIVER_ID).single();
        if (error) throw error;
        if (data) driverLang = data.language || 'English';
      } catch (e) {
        console.warn('Could not fetch driver language (SQL might not be applied):', e);
      }
    }

    async function updateMyLang() {
      try {
        const lang = document.getElementById('my-lang').value;
        APP.user.preferred_language = lang;
        localStorage.setItem('sf_user', JSON.stringify(APP.user));
        const { error } = await _supabase.from('safarr_users').update({ preferred_language: lang }).eq('id', APP.user.id);
        if (error) throw error;
        showToast('Language set to ' + lang);
      } catch (e) {
        console.error('Update lang error (SQL might not be applied):', e);
        showToast('Saved locally only');
      }
    }

    async function loadMessages() {
      const { data } = await _supabase
        .from('safarr_messages')
        .select('*')
        .or(`and(sender_id.eq.${APP.user.id},receiver_id.eq.${DRIVER_ID}),and(sender_id.eq.${DRIVER_ID},receiver_id.eq.${APP.user.id})`)
        .order('created_at', { ascending: true });

      if (data?.length) {
        document.getElementById('empty-state').style.display = 'none';
        data.forEach(renderMessage);
        scrollToBottom();
      }
    }

    function subscribeToMessages() {
      _supabase.channel('room-1')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'safarr_messages' }, (p) => {
          const m = p.new;
          if ((m.sender_id === APP.user.id && m.receiver_id === DRIVER_ID) || (m.sender_id === DRIVER_ID && m.receiver_id === APP.user.id)) {
            if (!document.getElementById('msg-' + m.id)) {
              document.getElementById('empty-state').style.display = 'none';
              renderMessage(m);
              scrollToBottom();
            }
          }
        }).subscribe();
    }

    function renderMessage(msg) {
      const feed = document.getElementById('messages-feed');
      const isSent = msg.sender_id === APP.user.id;
      const time = new Date(msg.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      
      const div = document.createElement('div');
      div.className = `msg-row ${isSent ? 'sent' : 'received'}`;
      div.id = 'msg-' + msg.id;

      let bubbleContent = '';
      if (msg.message_type === 'voice' && msg.voice_url) {
        bubbleContent = `
          <div class="voice-bubble">
            <button class="voice-play" onclick="playVoice('${msg.voice_url}', this, '${msg.translated_text ? msg.translated_text.replace(/'/g, "\\'") : ''}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <svg class="voice-wave" viewBox="0 0 100 24" preserveAspectRatio="none">${generateWave()}</svg>
            <span class="voice-dur">${msg.voice_duration || '0:05'}</span>
          </div>`;
        
        if (msg.translated_text) {
          bubbleContent += `
            <div class="translation-card">
              <button class="speak-btn" onclick="speakText('${msg.translated_text.replace(/'/g, "\\'")}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              </button>
              <div>
                <div style="font-size:0.6rem; opacity:0.6; margin-bottom:2px">AI TRANSLATION</div>
                ${msg.translated_text}
              </div>
            </div>`;
        }
      } else {
        bubbleContent = escapeHtml(msg.message || '');
      }

      div.innerHTML = `
        ${!isSent ? `<img class="msg-avatar" src="https://eouqjkvfbjefbyindqjp.supabase.co/storage/v1/object/public/driver-profiles/129480db-3d9a-4a5d-97e4-948b4c2c62b9/profile.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Rakesh&background=0050ff&color=fff'">` : ''}
        <div class="msg-bubble">${bubbleContent}<span class="msg-time">${time}${isSent ? ' ✓' : ''}</span></div>`;
      feed.appendChild(div);
    }

    function speakText(text) {
      if (!text) return;
      const utterance = new SpeechSynthesisUtterance(text);
      const myLang = document.getElementById('my-lang').value;
      if (myLang === 'Hindi') utterance.lang = 'hi-IN';
      else if (myLang === 'Marathi') utterance.lang = 'mr-IN';
      else utterance.lang = 'en-IN';
      window.speechSynthesis.speak(utterance);
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      autoResize(input);

      const msg = {
        sender_id: APP.user.id, sender_type: 'passenger', sender_name: APP.user.full_name || 'Passenger',
        receiver_id: DRIVER_ID, message: text, message_type: 'text'
      };
      const { data } = await _supabase.from('safarr_messages').insert(msg).select().single();
      if (data) { renderMessage(data); scrollToBottom(); }
    }

    // ── Voice logic ──
    async function toggleRecording() {
      const bar = document.getElementById('rec-bar');
      const btn = document.getElementById('voice-btn');
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          recordingChunks = [];
          mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
          mediaRecorder.onstop = uploadVoice;
          mediaRecorder.start();
          isRecording = true;
          bar.style.display = 'flex';
          btn.classList.add('recording');
        } catch(e) { alert('Mic access denied'); }
      } else {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        isRecording = false;
        bar.style.display = 'none';
        btn.classList.remove('recording');
      }
    }

    async function uploadVoice() {
      if (!recordingChunks.length) return;
      const blob = new Blob(recordingChunks, { type: 'audio/webm' });
      
      // 1. Get AI Translation (Fail-safe)
      let translatedText = '';
      try {
        showToast('AI translating...');
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        const base64 = await new Promise((resolve, reject) => {
          reader.onloadend = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
        });

        const aiRes = await fetch('/.netlify/functions/translate-voice', {
          method: 'POST',
          body: JSON.stringify({ audio: base64, targetLang: driverLang })
        });
        
        if (aiRes.ok) {
          const aiData = await aiRes.json();
          translatedText = aiData.translatedText || '';
        } else {
          const errData = await aiRes.json().catch(() => ({}));
          console.error('Netlify Function Error:', aiRes.status, errData);
        }
      } catch (e) { 
        console.error('AI Processing Skip (Translation Failed):', e); 
      }

      // 2. Upload to Storage
      try {
        const path = `voice/${Date.now()}.webm`;
        const { error: upErr } = await _supabase.storage.from('safarr-storage').upload(path, blob);
        if (upErr) throw upErr;
        
        const { data } = _supabase.storage.from('safarr-storage').getPublicUrl(path);
        const msg = {
          sender_id: APP.user.id, sender_type: 'passenger', sender_name: APP.user.full_name,
          receiver_id: DRIVER_ID, message: '🎤 Voice message',
          message_type: 'voice', voice_url: data.publicUrl, voice_duration: '0:05',
          translated_text: translatedText
        };

        // 3. Save to DB (Fail-safe for missing columns)
        const { data: mD, error: insErr } = await _supabase.from('safarr_messages').insert(msg).select().single();
        if (insErr) {
          console.warn('First insert failed, retrying without translated_text:', insErr.message);
          delete msg.translated_text; // Fallback to original columns
          const { data: mD2, error: insErr2 } = await _supabase.from('safarr_messages').insert(msg).select().single();
          if (insErr2) throw insErr2;
          if (mD2) { renderMessage(mD2); scrollToBottom(); }
        } else if (mD) { 
          renderMessage(mD); 
          scrollToBottom(); 
        }
      } catch (e) {
        console.error('Critical Upload Error:', e);
        showToast('Message failed to send');
      }
    }

    let currentAudio = null;
    let activePlayBtn = null;

    function playVoice(u, b, transText) {
      const playIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      const pauseIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

      if (currentAudio && activePlayBtn) {
        if (currentAudio.src === u) {
          if (!currentAudio.paused) {
            currentAudio.pause();
            b.innerHTML = playIcon;
            return;
          } else {
            currentAudio.play();
            b.innerHTML = pauseIcon;
            if (transText) speakText(transText); // Auto-speak translation
            return;
          }
        } else {
          currentAudio.pause();
          activePlayBtn.innerHTML = playIcon;
        }
      }

      currentAudio = new Audio(u);
      activePlayBtn = b;
      currentAudio.play();
      b.innerHTML = pauseIcon;
      if (transText) speakText(transText); // Auto-speak translation

      currentAudio.onended = () => {
        b.innerHTML = playIcon;
        currentAudio = null;
        activePlayBtn = null;
      };
    }

    function generateWave() {
      let d = '';
      for (let i = 0; i < 20; i++) {
        const h = 4 + Math.random() * 16;
        d += `<rect x="${i * 5}" y="${12 - h/2}" width="3" height="${h}" rx="1.5" fill="currentColor" opacity="${0.3 + Math.random() * 0.7}"/>`;
      }
      return d;
    }

    function startVoiceCall() { window.open('tel:9876543210'); }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }
    function scrollToBottom() { const f = document.getElementById('messages-feed'); f.scrollTop = f.scrollHeight; }
    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function handleKey(e) { if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); sendMessage();} }

    // ── VIEWPORT HEIGHT FIX FOR ANDROID ────────────────
    // Android Chrome includes the nav bar in 100vh — this fixes it
    function setVh() {
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.body.style.height = vh + 'px';
    }
    setVh();
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', setVh);
    } else {
      window.addEventListener('resize', setVh);
    }

    // Back button
    window.history.pushState({page:1}, '', '');
    window.onpopstate = () => window.location.href = 'index.html';
  </script>
</body>
</html>
